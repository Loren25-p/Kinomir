<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КиноМир - Смотреть фильмы онлайн</title>
    <meta name="theme-color" content="#111827">
    
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключение шрифта Inter с Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Подключение файла со стилями -->
    <link rel="stylesheet" href="style.css">
    
</head>
<body class="bg-gray-900 text-gray-100">

    <!-- Ссылка для перехода к основному контенту (доступность) -->
    <a href="#main" class="skip-link sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[60] focus:bg-white focus:text-black focus:px-4 focus:py-2 focus:rounded">Перейти к содержимому</a>

    <!-- Шапка сайта -->
    <header class="fixed top-0 left-0 right-0 bg-gray-900 bg-opacity-80 backdrop-blur-sm z-50" role="banner">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="#" class="text-2xl font-bold text-red-500">КиноМир</a>
                    <nav class="hidden md:flex items-center space-x-6 text-sm font-medium" aria-label="Основная навигация">
                        <a href="#" class="text-gray-200 hover:text-red-500 transition">Главная</a>
                        <a href="#" class="text-gray-400 hover:text-red-500 transition">Фильмы</a>
                        <a href="#" class="text-gray-400 hover:text-red-500 transition">Сериалы</a>
                        <a href="#" id="nav-mylist" class="text-gray-400 hover:text-red-500 transition">Мой список</a>
                    </nav>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <input id="search-input" type="text" placeholder="Поиск..." aria-label="Поиск фильмов" class="bg-gray-800 border border-gray-700 rounded-full py-1.5 px-4 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 w-32 md:w-48 transition-all" autocomplete="off">
                        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center font-bold text-white">A</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main id="main" class="pt-16" role="main">
        <!-- "Герой" секция с главным фильмом -->
        <section id="hero-section" class="relative h-[60vh] md:h-[80vh] flex items-end text-white p-4 sm:p-8 lg:p-12" aria-label="Рекомендованный фильм">
            <div class="absolute inset-0">
                <img id="hero-backdrop" src="https://placehold.co/1600x900/111827/111827?text=+" alt="Постер фильма" class="w-full h-full object-cover" loading="lazy">
                <div class="absolute inset-0 hero-gradient"></div>
            </div>
            <div class="relative z-10 max-w-xl">
                <h1 id="hero-title" class="text-4xl md:text-6xl font-black mb-4">Загрузка...</h1>
                <p id="hero-overview" class="text-gray-300 mb-6 text-sm md:text-base max-w-lg"></p>
                <div class="flex space-x-4">
                    <button id="hero-watch-btn" class="watch-btn bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-full flex items-center space-x-2 transition" aria-label="Смотреть трейлер выбранного фильма">
                        <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                        <span>Смотреть</span>
                    </button>
                    <button id="hero-details-btn" class="details-btn bg-gray-700 bg-opacity-60 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded-full transition" aria-haspopup="dialog" aria-controls="modal-content">
                        Подробнее
                    </button>
                </div>
            </div>
        </section>

        <!-- Карусели с фильмами -->
        <div class="space-y-12 py-12 container mx-auto px-4 sm:px-6 lg:px-8">
            <section aria-labelledby="popular-heading">
                <h2 id="popular-heading" class="text-2xl font-bold mb-4">Популярно сейчас</h2>
                <div id="popular-movies" class="flex space-x-4 overflow-x-auto pb-4 -mx-4 px-4 no-scrollbar" role="list" aria-label="Популярные фильмы"></div>
            </section>
            <section aria-labelledby="top-rated-heading">
                <h2 id="top-rated-heading" class="text-2xl font-bold mb-4">Лучшие оценки</h2>
                <div id="top-rated-movies" class="flex space-x-4 overflow-x-auto pb-4 -mx-4 px-4 no-scrollbar" role="list" aria-label="Фильмы с высокими оценками"></div>
            </section>
             <section aria-labelledby="upcoming-heading">
                <h2 id="upcoming-heading" class="text-2xl font-bold mb-4">Ожидаемые новинки</h2>
                <div id="upcoming-movies" class="flex space-x-4 overflow-x-auto pb-4 -mx-4 px-4 no-scrollbar" role="list" aria-label="Скоро в прокате"></div>
            </section>
            <section aria-labelledby="mylist-heading">
                <h2 id="mylist-heading" class="text-2xl font-bold mb-4">Мой список</h2>
                <div id="my-list" class="flex space-x-4 overflow-x-auto pb-4 -mx-4 px-4 no-scrollbar" role="list" aria-label="Избранные фильмы"></div>
            </section>
        </div>
    </main>

    <!-- Модальное окно для подробной информации -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-4 hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="-1">
        <div id="modal-content" class="bg-gray-800 rounded-lg shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto relative modal-enter"></div>
    </div>

    <!-- Оверлей для плеера -->
    <div id="player-overlay" class="fixed inset-0 bg-black bg-opacity-90 z-50 flex items-center justify-center hidden" role="dialog" aria-modal="true" aria-label="Плеер трейлера" tabindex="-1">
        <button id="close-player" class="absolute top-5 right-5 text-white z-10">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div id="player-container" class="relative w-full max-w-4xl aspect-video">
            <!-- Iframe плеера будет вставлен сюда -->
        </div>
    </div>

    <!-- Модульный скрипт приложения -->
    <script type="module" src="/src/main.js"></script>

</body>
</html>
